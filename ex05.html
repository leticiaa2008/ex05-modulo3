<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Batalha das 12 Casas</title>

 <style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    color: #e2e8f0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    width: 300px;
    animation: fadeIn 1s ease-in-out;
  }

  h1 {
    margin-bottom: 20px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 14px;
  }

  input {
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    transition: 0.3s;
  }

  input::placeholder {
    color: #cbd5f5;
  }

  input:focus {
    background: rgba(255,255,255,0.2);
    transform: scale(1.03);
  }

  button {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(239,68,68,0.7);
  }

  label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
  }

  #resultado {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
    min-height: 40px;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

  <div class="container">
    <h1>Batalha das 12 Casas</h1>

    <div>
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <div>
      <input type="number" id="cosmo" placeholder="Cosmo inicial">
    </div>

    <div>
      <label>
        <input type="checkbox" id="sacrificio">
        Sacrificar sentidos (dobrar cosmo)
      </label>
    </div>

    <button onclick="iniciarJornada()">Iniciar Jornada</button>

    <div id="resultado"></div>
  </div>

  <script>
    function iniciarJornada() {
      const nome = document.getElementById("nome").value;
      
      
      let cosmo = +document.getElementById("cosmo").value;

      
      const sacrificar = document.getElementById("sacrificio").checked;
      cosmo = sacrificar ? cosmo * 2 : cosmo;

      let casas = 12;
      let danoPorCasa = 100;

      
      for (let i = 1; i <= casas; i++) {
        cosmo = cosmo >= danoPorCasa ? cosmo - danoPorCasa : cosmo;
      }

    
      let status = cosmo >= 1000 ? "Vivo" : "Derrotado";

    
      let mensagem = (cosmo >= 1000 && status === "Vivo")
        ? `Parabéns, ${nome}! Você salvou Athena com ${cosmo} de cosmo restante!`
        : `Que pena, ${nome}... você falhou. Cosmo final: ${cosmo}`;

      document.getElementById("resultado").innerText = mensagem;
    }
  </script>

</body>
</html>
